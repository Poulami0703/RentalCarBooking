# ============================================================
# RentalCarProject - Application Configuration
# ============================================================

spring:
  application:
    name: RentalCarProject

  # ---- H2 In-Memory Database ----
  datasource:
    url: jdbc:h2:mem:rentalcardb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false    # only localhost access

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ---- Mail (configure SMTP in production) ----
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@rentalcar.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ---- OAuth2 (configure real client IDs in production via env vars) ----
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: email,profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
            scope: email,public_profile

# ============================================================
# Application-specific settings
# ============================================================
app:
  jwt:
    # 512-bit Base64-encoded secret — replace with a secure random value in production
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1qd3Qtc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTUxMi1iaXRzLWxvbmctZm9yLUhTNTEy}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}

# ============================================================
# Actuator
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ============================================================
# SpringDoc / Swagger UI
# ============================================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    groups-order: ASC
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# ============================================================
# Server
# ============================================================
server:
  port: 8080
  address: 127.0.0.1
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# ============================================================
# Logging
# ============================================================
logging:
  level:
    root: INFO
    com.rentalcar.booking: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/rental-car.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
